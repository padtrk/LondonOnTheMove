<!DOCTYPE html>
<html>
<head>
    <title>London Marauder's Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { width: 100vw; height: 100vh; background: #1a1a1a; }
        body { margin: 0; padding: 0; }
        .legend { position: absolute; top: 10px; left: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="legend">
        <b>Live Commute</b><br>
        <span style="color:#e10600">●</span> Bus 26<br>
        <span style="color:#ef7b10">●</span> Overground<br>
        <span style="color:#9364cc">●</span> Elizabeth Line
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([51.53, -0.08], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        const markerLayer = L.layerGroup().addTo(map);

        async function updateMap() {
            markerLayer.clearLayers();
            // We fetch the 'Arrivals' for each specific line
            fetchLine('26', '#e10600', 'Bus 26');
            fetchLine('london-overground', '#ef7b10', 'Overground');
            fetchLine('elizabeth', '#9364cc', 'Elizabeth Line');
        }

        async function fetchLine(lineId, color, label) {
            try {
                const url = `https://api.tfl.gov.uk/Line/${lineId}/Arrivals`;
                const response = await fetch(url);
                if (!response.ok) return;

                const data = await response.json();
                const seen = new Set();

                data.forEach(item => {
                    // CRITICAL FIX: Only draw if we have lat/lon AND haven't seen this vehicle yet
                    if (item.latitude && item.longitude && !seen.has(item.vehicleId)) {
                        seen.add(item.vehicleId);
                        
                        L.circleMarker([item.latitude, item.longitude], {
                            radius: label.includes('Bus') ? 6 : 10,
                            fillColor: color,
                            color: "#fff",
                            weight: 2,
                            fillOpacity: 0.9
                        }).addTo(markerLayer).bindPopup(`${label}: ${item.currentLocation}`);
                    }
                });
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        updateMap();
        setInterval(updateMap, 30000); // Refresh every 30 seconds
    </script>
</body>
</html>
