<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>London Live Buses — Ants Map (Real Data)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0b0e11;
    color: #d0d0d0;
    font-family: system-ui, sans-serif;
  }

  #map {
    width: 100vw;
    height: 100vh;
  }

  .label {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(0,0,0,0.65);
    padding: 10px 14px;
    border-radius: 6px;
    z-index: 1000;
    font-size: 14px;
  }

  .label strong {
    color: #fff;
  }
</style>
</head>
<body>

<div id="map"></div>

<div class="label">
  <strong>London buses (live)</strong><br>
  GPS positions — TfL<br>
  Updates every ~30s
</div>

<script>
// --------------------------------------------------
// 1. Base map
// --------------------------------------------------

const map = L.map("map", {
  zoomControl: false,
  attributionControl: false
}).setView([51.5074, -0.1278], 12);

L.tileLayer(
  "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
  { maxZoom: 19 }
).addTo(map);

// --------------------------------------------------
// 2. Canvas layer (important for performance)
// --------------------------------------------------

const canvasRenderer = L.canvas({ padding: 0.5 });
const busLayer = L.layerGroup().addTo(map);

// --------------------------------------------------
// 3. Fetch live TfL bus data
// --------------------------------------------------

async function loadBuses() {
  try {
    const res = await fetch("https://api.tfl.gov.uk/Vehicle");
    const vehicles = await res.json();

    busLayer.clearLayers();

    vehicles.forEach(v => {
      if (!v.latitude || !v.longitude) return;

      L.circleMarker(
        [v.latitude, v.longitude],
        {
          renderer: canvasRenderer,
          radius: 1.6,
          fillColor: "#e10600",
          fillOpacity: 0.8,
          stroke: false
        }
      ).addTo(busLayer);
    });

    console.log(`Rendered ${vehicles.length} buses`);
  } catch (err) {
    console.error("TfL fetch failed", err);
  }
}

// --------------------------------------------------
// 4. Run loop
// --------------------------------------------------

loadBuses();
setInterval(loadBuses, 30000); // TfL updates ~30s

</script>

</body>
</html>
