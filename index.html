<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Marauder's Map — Route 26</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  :root {
    --ink: #2b1810;
    --parchment: #e8dcc0;
    --bus: #8b0000;
    --bus-glow: rgba(139, 0, 0, 0.45);
    --stop: #5a3a1a;
  }

  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--parchment);
    font-family: Georgia, 'Times New Roman', serif;
    color: var(--ink);
  }

  #header {
    position: absolute; top: 0; left: 0; right: 0;
    z-index: 1000;
    padding: 10px 16px;
    background: linear-gradient(to bottom, rgba(232, 220, 192, 0.95), rgba(232, 220, 192, 0.7) 80%, transparent);
    pointer-events: none;
  }
  #title {
    font-style: italic; font-size: 22px; font-weight: normal;
    letter-spacing: 0.5px; margin: 0;
  }
  #subtitle {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    margin: 2px 0 0 0; opacity: 0.7;
  }

  #status {
    position: absolute; bottom: 10px; left: 10px;
    z-index: 1000;
    background: rgba(232, 220, 192, 0.9);
    border: 1px solid var(--ink);
    padding: 6px 10px;
    font-size: 12px;
    font-family: 'Courier New', monospace;
    max-width: 280px;
  }

  #map {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: var(--parchment);
  }

  .leaflet-tile-pane {
    filter: sepia(0.6) saturate(0.7) brightness(0.95) contrast(0.9);
  }

  .stop-marker {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--stop);
    border: 1px solid var(--ink);
    opacity: 0.6;
  }

  .bus-marker {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--bus);
    border: 2px solid var(--ink);
    box-shadow: 0 0 12px 4px var(--bus-glow);
    position: relative;
  }

  .bus-marker.stale { opacity: 0.45; }

  .bus-label {
    position: absolute; top: -22px; left: 50%;
    transform: translateX(-50%);
    font-style: italic; font-size: 11px;
    color: var(--ink);
    background: rgba(232, 220, 192, 0.9);
    padding: 1px 5px; white-space: nowrap;
    border: 1px solid var(--ink);
    pointer-events: none;
  }

  .leaflet-container { background: var(--parchment); }
</style>
</head>
<body>

<div id="header">
  <h1 id="title">The Marauder's Map</h1>
  <p id="subtitle">Route 26 &middot; Hackney Wick &#8652; Waterloo &middot; live GPS</p>
</div>

<div id="map"></div>
<div id="status">Initialising&hellip;</div>

<script>
(function () {
  'use strict';

  const WORKER_URL = 'https://workers-playground-white-meadow-b853.patrickevanswork.workers.dev/';
  const LINE_ID = '26';
  const REFRESH_MS = 15000;
  const STALE_AFTER_SECONDS = 300;

  const statusEl = document.getElementById('status');
  function log(msg) {
    statusEl.textContent = msg;
    console.log('[bus26]', msg);
  }

  const map = L.map('map', { zoomControl: true }).setView([51.52, -0.08], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap &middot; Live GPS &copy; BODS / TfL'
  }).addTo(map);

  const stopsById = {};
  const busMarkers = {};

  async function loadRoute() {
    log('Loading route 26 geometry…');

    const outUrl = `https://api.tfl.gov.uk/Line/${LINE_ID}/Route/Sequence/outbound?serviceTypes=Regular,Night&excludeCrowding=true`;
    const inUrl  = `https://api.tfl.gov.uk/Line/${LINE_ID}/Route/Sequence/inbound?serviceTypes=Regular,Night&excludeCrowding=true`;

    const [outRes, inRes] = await Promise.all([
      fetch(outUrl).then(r => r.json()),
      fetch(inUrl).then(r => r.json())
    ]);

    ingestStops(outRes);
    ingestStops(inRes);
    drawRouteLines(outRes);
    drawRouteLines(inRes);
    drawStops();

    const allCoords = Object.values(stopsById).map(s => [s.lat, s.lon]);
    if (allCoords.length) map.fitBounds(allCoords, { padding: [40, 40] });
    log(`Route loaded · ${Object.keys(stopsById).length} stops`);
  }

  function ingestStops(data) {
    (data.stopPointSequences || []).forEach(branch => {
      (branch.stopPoint || []).forEach(sp => {
        if (!stopsById[sp.id]) {
          stopsById[sp.id] = { lat: sp.lat, lon: sp.lon, name: sp.name };
        }
      });
    });
  }

  function drawRouteLines(data) {
    (data.lineStrings || []).forEach(ls => {
      try {
        const coords = JSON.parse(ls);
        const latlngs = coords.map(([lon, lat]) => [lat, lon]);
        L.polyline(latlngs, {
          color: '#2b1810', weight: 2.5, opacity: 0.55, dashArray: '6, 4'
        }).addTo(map);
      } catch (e) {
        console.warn('Could not parse lineString', e);
      }
    });
  }

  function drawStops() {
    Object.values(stopsById).forEach(s => {
      L.marker([s.lat, s.lon], {
        icon: L.divIcon({
          className: '',
          html: '<div class="stop-marker"></div>',
          iconSize: [10, 10],
          iconAnchor: [5, 5]
        }),
        title: s.name,
        keyboard: false
      }).addTo(map);
    });
  }

  async function loadVehicles() {
    try {
      const res = await fetch(WORKER_URL);
      if (!res.ok) throw new Error('worker returned ' + res.status);
      const data = await res.json();

      if (data.error) {
        log('Worker error: ' + data.error);
        return;
      }

      const seen = new Set();
      const now = Date.now();

      (data.vehicles || []).forEach(v => {
        if (!isFinite(v.lat) || !isFinite(v.lon)) return;
        if (v.lat === 0 && v.lon === 0) return;

        const id = v.vehicleRef;
        seen.add(id);

        const recordedMs = v.recordedAt ? new Date(v.recordedAt).getTime() : now;
        const ageSec = Math.max(0, (now - recordedMs) / 1000);
        const isStale = ageSec > STALE_AFTER_SECONDS;

        const dest = (v.destinationName || '').replace(/_/g, ' ').trim() || '—';
        const labelText = `${shortReg(id)} → ${dest}`;
        const cls = 'bus-marker' + (isStale ? ' stale' : '');

        if (busMarkers[id]) {
          busMarkers[id].setLatLng([v.lat, v.lon]);
          const el = busMarkers[id].getElement();
          if (el) {
            const dot = el.querySelector('.bus-marker');
            if (dot) dot.className = cls;
            const lbl = el.querySelector('.bus-label');
            if (lbl) lbl.textContent = labelText;
          }
        } else {
          const html = `<div class="${cls}"><div class="bus-label">${labelText}</div></div>`;
          busMarkers[id] = L.marker([v.lat, v.lon], {
            icon: L.divIcon({
              className: '',
              html: html,
              iconSize: [18, 18],
              iconAnchor: [9, 9]
            }),
            title: labelText,
            zIndexOffset: 1000
          }).addTo(map);
        }
      });

      Object.keys(busMarkers).forEach(id => {
        if (!seen.has(id)) {
          map.removeLayer(busMarkers[id]);
          delete busMarkers[id];
        }
      });

      const localTime = new Date().toLocaleTimeString('en-GB');
      log(`${seen.size} buses · GPS · updated ${localTime}`);
    } catch (err) {
      console.error(err);
      log('Error fetching GPS — retrying…');
    }
  }

  function shortReg(ref) {
    if (!ref) return '????';
    if (ref.length >= 7) return ref.slice(0, 4) + ' ' + ref.slice(4, 7);
    return ref;
  }

  (async function init() {
    try {
      await loadRoute();
      await loadVehicles();
      setInterval(loadVehicles, REFRESH_MS);
    } catch (err) {
      console.error(err);
      log('Failed to initialise: ' + err.message);
    }
  })();
})();
</script>
</body>
</html>
