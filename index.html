<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Marauder's Map — London Buses</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=IM+Fell+English:ital@0;1&family=Uncial+Antiqua&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  :root {
    --parchment:       #e8dcc0;
    --parchment-dark:  #d4c49a;
    --parchment-deep:  #c5ae82;
    --ink:             #1a0f00;
    --ink-faint:       rgba(26,15,0,0.45);
    --gryff-red:       #8b0000;
    --gryff-gold:      #c8960c;
    --gryff-red-glow:  rgba(139,0,0,0.5);
    --gryff-gold-glow: rgba(200,150,12,0.5);
    --slyth-green:     #1a5c2a;
    --slyth-silver:    #7a8c7e;
    --slyth-green-glow:  rgba(26,92,42,0.5);
    --slyth-silver-glow: rgba(122,140,126,0.5);
    --raven-blue:      #0e2a5c;
    --raven-bronze:    #8b5e00;
    --raven-blue-glow:   rgba(14,42,92,0.5);
    --raven-bronze-glow: rgba(139,94,0,0.5);
    --stop-yellow:     #f5c518;
    --stop-border:     #7a6000;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--parchment);
    font-family: 'IM Fell English', Georgia, serif;
    color: var(--ink);
    overflow: hidden;
  }

  /* ── MAP ─────────────────────────────────────────── */
  #map {
    position: absolute; inset: 0;
    background: var(--parchment);
  }

  .leaflet-tile-pane {
    filter: sepia(0.75) saturate(0.55) brightness(0.92) contrast(0.88);
  }

  .leaflet-container { background: var(--parchment); }

  /* ── HEADER ──────────────────────────────────────── */
  #header {
    position: absolute; top: 0; left: 0; right: 0;
    z-index: 1000;
    padding: 12px 16px 20px;
    background: linear-gradient(to bottom,
      rgba(232,220,192,0.98) 0%,
      rgba(232,220,192,0.85) 70%,
      transparent 100%);
    pointer-events: none;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  #title-block { pointer-events: none; }

  #title {
    font-family: 'Uncial Antiqua', Georgia, serif;
    font-size: clamp(20px, 4vw, 28px);
    font-weight: normal;
    letter-spacing: 1px;
    color: var(--ink);
    text-shadow:
      1px 1px 0 rgba(255,255,255,0.4),
      -1px -1px 0 rgba(26,15,0,0.2);
    line-height: 1.1;
  }

  #subtitle {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 1.5px;
    opacity: 0.65;
    margin-top: 2px;
  }

  /* ── ROUTE SELECTOR ──────────────────────────────── */
  #selector-wrap {
    position: absolute;
    top: 12px; right: 12px;
    z-index: 1001;
    pointer-events: all;
  }

  #route-select {
    font-family: 'Uncial Antiqua', Georgia, serif;
    font-size: 15px;
    color: var(--ink);
    background: var(--parchment);
    border: 2px solid var(--ink);
    padding: 5px 10px;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    box-shadow: 2px 2px 0 var(--ink);
    outline: none;
    min-width: 100px;
    text-align: center;
  }

  #route-select:focus {
    background: var(--parchment-dark);
  }

  /* ── STATS PANEL ─────────────────────────────────── */
  #stats {
    position: absolute;
    bottom: 36px; left: 10px;
    z-index: 1000;
    background: rgba(232,220,192,0.93);
    border: 1.5px solid var(--ink);
    padding: 10px 14px;
    font-size: 11px;
    font-family: 'IM Fell English', serif;
    min-width: 190px;
    box-shadow: 2px 2px 0 rgba(26,15,0,0.25);
  }

  #stats-title {
    font-family: 'Uncial Antiqua', serif;
    font-size: 12px;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--ink-faint);
    padding-bottom: 5px;
    margin-bottom: 7px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    line-height: 1.7;
  }

  .stat-label { opacity: 0.7; font-style: italic; }
  .stat-val   { font-weight: bold; letter-spacing: 0.5px; }

  #updated {
    font-style: italic;
    opacity: 0.6;
    font-size: 10px;
    margin-top: 6px;
    border-top: 1px solid var(--ink-faint);
    padding-top: 5px;
  }

  /* ── LEGEND ──────────────────────────────────────── */
  #legend {
    position: absolute;
    bottom: 36px; right: 10px;
    z-index: 1000;
    background: rgba(232,220,192,0.93);
    border: 1.5px solid var(--ink);
    padding: 10px 14px;
    font-size: 11px;
    font-family: 'IM Fell English', serif;
    box-shadow: 2px 2px 0 rgba(26,15,0,0.25);
    line-height: 1.9;
  }

  #legend-title {
    font-family: 'Uncial Antiqua', serif;
    font-size: 12px;
    border-bottom: 1px solid var(--ink-faint);
    padding-bottom: 5px;
    margin-bottom: 6px;
  }

  .leg-row { display: flex; align-items: center; gap: 8px; }

  .leg-dot {
    width: 11px; height: 11px; border-radius: 50%;
    border: 1.5px solid var(--ink);
    flex-shrink: 0;
  }

  .leg-sq {
    width: 9px; height: 9px;
    background: var(--stop-yellow);
    border: 1.5px solid var(--stop-border);
    flex-shrink: 0;
  }

  /* ── ATTRIBUTION ─────────────────────────────────── */
  #attribution {
    position: absolute;
    bottom: 5px; left: 10px;
    z-index: 1000;
    font-size: 9px;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    opacity: 0.55;
    pointer-events: none;
  }

  /* ── BUS MARKERS ─────────────────────────────────── */
  .bus-dot {
    width: 13px; height: 13px; border-radius: 50%;
    border: 2px solid var(--ink);
    transition: opacity 0.3s;
  }
  .bus-dot.stale { opacity: 0.3; }

  /* Route 26 */
  .bus-dot.r26-1 { background: var(--gryff-red);   box-shadow: 0 0 8px 3px var(--gryff-red-glow); }
  .bus-dot.r26-2 { background: var(--gryff-gold);  box-shadow: 0 0 8px 3px var(--gryff-gold-glow); }
  /* Route 55 */
  .bus-dot.r55-1 { background: var(--slyth-green);  box-shadow: 0 0 8px 3px var(--slyth-green-glow); }
  .bus-dot.r55-2 { background: var(--slyth-silver); box-shadow: 0 0 8px 3px var(--slyth-silver-glow); }
  /* Route 149 */
  .bus-dot.r149-1 { background: var(--raven-blue);   box-shadow: 0 0 8px 3px var(--raven-blue-glow); }
  .bus-dot.r149-2 { background: var(--raven-bronze); box-shadow: 0 0 8px 3px var(--raven-bronze-glow); }

  /* ── STOP MARKERS ────────────────────────────────── */
  .stop-sq {
    width: 8px; height: 8px;
    background: var(--stop-yellow);
    border: 1.5px solid var(--stop-border);
    opacity: 0.85;
  }

  /* ── INCANTATION FOOTER ───────────────────────────── */
  #incantation {
    position: absolute;
    bottom: 5px; right: 10px;
    z-index: 1000;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 9px;
    opacity: 0.45;
    pointer-events: none;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div id="map"></div>

<div id="header">
  <div id="title-block">
    <h1 id="title">The Marauder's Map</h1>
    <p id="subtitle">Live Bus Positions &middot; London</p>
  </div>
</div>

<div id="selector-wrap">
  <select id="route-select">
    <option value="26">Route 26</option>
    <option value="55">Route 55</option>
    <option value="149">Route 149</option>
  </select>
</div>

<div id="stats">
  <div id="stats-title">Positions Known</div>
  <div class="stat-row"><span class="stat-label">Active</span><span class="stat-val" id="s-active">—</span></div>
  <div class="stat-row"><span class="stat-label">In Garage</span><span class="stat-val" id="s-stale">—</span></div>
  <div id="updated">Awaiting the oracle…</div>
</div>

<div id="legend">
  <div id="legend-title">The Key</div>
  <div id="legend-body"></div>
</div>

<div id="attribution">Paddy Evans &middot; padtrk &middot; patrickevanswork@gmail.com &middot; &copy; BODS / TfL / OpenStreetMap</div>
<div id="incantation">I solemnly swear that I am up to no good</div>

<script>
(function () {
  'use strict';

  const WORKER_URL   = 'https://workers-playground-white-meadow-b853.patrickevanswork.workers.dev/';
  const REFRESH_MS   = 15000;
  const STALE_SECS   = 180;
  const STOP_ZOOM    = 14;

  // ── Route config ────────────────────────────────────
  const ROUTES = {
    '26':  {
      name: 'Route 26',
      terminus: ['Victoria', 'Hackney Wick'],
      dir1Class: 'r26-1', dir2Class: 'r26-2',
      dir1Colour: '#8b0000', dir2Colour: '#c8960c',
      lineColour1: '#8b0000', lineColour2: '#c8960c',
      tflId: '26',
    },
    '55':  {
      name: 'Route 55',
      terminus: ['Oxford Circus', 'Walthamstow'],
      dir1Class: 'r55-1', dir2Class: 'r55-2',
      dir1Colour: '#1a5c2a', dir2Colour: '#7a8c7e',
      lineColour1: '#1a5c2a', lineColour2: '#7a8c7e',
      tflId: '55',
    },
    '149': {
      name: 'Route 149',
      terminus: ['London Bridge', 'Edmonton Green'],
      dir1Class: 'r149-1', dir2Class: 'r149-2',
      dir1Colour: '#0e2a5c', dir2Colour: '#8b5e00',
      lineColour1: '#0e2a5c', lineColour2: '#8b5e00',
      tflId: '149',
    },
  };

  // ── State ────────────────────────────────────────────
  let activeRoute   = '26';
  let allVehicles   = [];
  let busMarkers    = {};
  let routeLines    = [];
  let stopMarkers   = [];
  let stopsData     = {};
  let stopsLoaded   = {};
  let stopsVisible  = false;

  // ── Map ──────────────────────────────────────────────
  const map = L.map('map', { zoomControl: true }).setView([51.52, -0.09], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: ''
  }).addTo(map);

  // ── Legend ───────────────────────────────────────────
  function buildLegend(route) {
    const cfg = ROUTES[route];
    const body = document.getElementById('legend-body');
    body.innerHTML = `
      <div class="leg-row"><span class="leg-dot" style="background:${cfg.dir1Colour};box-shadow:0 0 6px 2px ${cfg.dir1Colour}88"></span> → ${cfg.terminus[0]}</div>
      <div class="leg-row"><span class="leg-dot" style="background:${cfg.dir2Colour};box-shadow:0 0 6px 2px ${cfg.dir2Colour}88"></span> → ${cfg.terminus[1]}</div>
      <div class="leg-row"><span class="leg-sq"></span> Bus stop (zoom in)</div>
    `;
  }

  // ── Route lines ──────────────────────────────────────
  function clearRouteLines() {
    routeLines.forEach(l => map.removeLayer(l));
    routeLines = [];
  }

  async function loadRoute(routeId) {
    clearRouteLines();
    const cfg = ROUTES[routeId];
    const [outRes, inRes] = await Promise.all([
      fetch(`https://api.tfl.gov.uk/Line/${cfg.tflId}/Route/Sequence/outbound?serviceTypes=Regular&excludeCrowding=true`).then(r => r.json()),
      fetch(`https://api.tfl.gov.uk/Line/${cfg.tflId}/Route/Sequence/inbound?serviceTypes=Regular&excludeCrowding=true`).then(r => r.json()),
    ]);

    drawLines(outRes, cfg.lineColour1);
    drawLines(inRes,  cfg.lineColour2);

    // Stops
    if (!stopsLoaded[routeId]) {
      stopsData[routeId] = {};
      ingestStops(outRes, routeId);
      ingestStops(inRes,  routeId);
      stopsLoaded[routeId] = true;
    }

    redrawStops();

    const allCoords = Object.values(stopsData[routeId]).map(s => [s.lat, s.lon]);
    if (allCoords.length) map.fitBounds(allCoords, { padding: [50, 50] });
  }

  function drawLines(data, colour) {
    (data.lineStrings || []).forEach(ls => {
      try {
        const coords = JSON.parse(ls);
        const latlngs = coords.map(([lon, lat]) => [lat, lon]);
        const l = L.polyline(latlngs, {
          color: colour, weight: 2.5, opacity: 0.45, dashArray: '7, 5'
        }).addTo(map);
        routeLines.push(l);
      } catch (e) {}
    });
  }

  function ingestStops(data, routeId) {
    (data.stopPointSequences || []).forEach(branch => {
      (branch.stopPoint || []).forEach(sp => {
        if (!stopsData[routeId][sp.id]) {
          stopsData[routeId][sp.id] = { lat: sp.lat, lon: sp.lon, name: sp.name };
        }
      });
    });
  }

  // ── Stop markers ─────────────────────────────────────
  function clearStops() {
    stopMarkers.forEach(m => map.removeLayer(m));
    stopMarkers = [];
  }

  function redrawStops() {
    clearStops();
    if (!stopsLoaded[activeRoute]) return;
    const zoom = map.getZoom();
    if (zoom < STOP_ZOOM) return;
    Object.values(stopsData[activeRoute]).forEach(s => {
      const m = L.marker([s.lat, s.lon], {
        icon: L.divIcon({
          className: '',
          html: '<div class="stop-sq"></div>',
          iconSize: [10, 10],
          iconAnchor: [5, 5],
        }),
        title: s.name,
        keyboard: false,
        zIndexOffset: 0,
      }).addTo(map);
      stopMarkers.push(m);
    });
  }

  map.on('zoomend', redrawStops);

  // ── Bus markers ──────────────────────────────────────
  function clearBusMarkers() {
    Object.values(busMarkers).forEach(m => map.removeLayer(m));
    busMarkers = {};
  }

  function renderVehicles() {
    const cfg   = ROUTES[activeRoute];
    const now   = Date.now();
    const shown = allVehicles.filter(v => v.route === activeRoute);
    const seen  = new Set();

    let activeCount = 0;
    let staleCount  = 0;

    shown.forEach(v => {
      if (!isFinite(v.lat) || !isFinite(v.lon)) return;
      if (v.lat === 0 && v.lon === 0) return;

      const id      = v.vehicleRef;
      seen.add(id);

      const ageSec  = Math.max(0, (now - new Date(v.recordedAt).getTime()) / 1000);
      const isStale = ageSec > STALE_SECS;
      isStale ? staleCount++ : activeCount++;

      const dirClass = v.directionRef === '1' ? cfg.dir1Class : cfg.dir2Class;
      const cls      = `bus-dot ${dirClass}${isStale ? ' stale' : ''}`;
      const dest     = (v.destinationName || '').replace(/_/g, ' ').trim() || '—';
      const title    = `${v.route} · ${shortReg(v.vehicleRef)} → ${dest}`;

      if (busMarkers[id]) {
        busMarkers[id].setLatLng([v.lat, v.lon]);
        const el = busMarkers[id].getElement();
        if (el) {
          const dot = el.querySelector('.bus-dot');
          if (dot) dot.className = cls;
        }
      } else {
        busMarkers[id] = L.marker([v.lat, v.lon], {
          icon: L.divIcon({
            className: '',
            html: `<div class="${cls}"></div>`,
            iconSize: [13, 13],
            iconAnchor: [6, 6],
          }),
          title,
          zIndexOffset: 1000,
        }).addTo(map);
      }
    });

    // Remove markers no longer in this route's data
    Object.keys(busMarkers).forEach(id => {
      if (!seen.has(id)) {
        map.removeLayer(busMarkers[id]);
        delete busMarkers[id];
      }
    });

    document.getElementById('s-active').textContent = activeCount;
    document.getElementById('s-stale').textContent  = staleCount;
    document.getElementById('updated').textContent  =
      'Observed: ' + new Date().toLocaleTimeString('en-GB');
  }

  // ── Worker fetch ─────────────────────────────────────
  async function fetchVehicles() {
    try {
      const res  = await fetch(WORKER_URL);
      if (!res.ok) throw new Error('worker ' + res.status);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      allVehicles = data.vehicles || [];
      renderVehicles();
    } catch (err) {
      console.error('[marauder]', err);
      document.getElementById('updated').textContent = 'The map has gone dark…';
    }
  }

  // ── Route switching ──────────────────────────────────
  async function switchRoute(routeId) {
    activeRoute = routeId;
    clearBusMarkers();
    buildLegend(routeId);
    document.getElementById('s-active').textContent = '—';
    document.getElementById('s-stale').textContent  = '—';
    document.getElementById('updated').textContent  = 'Consulting the oracle…';
    await loadRoute(routeId);
    renderVehicles();
  }

  document.getElementById('route-select').addEventListener('change', e => {
    switchRoute(e.target.value);
  });

  // ── Init ─────────────────────────────────────────────
  (async function init() {
    buildLegend(activeRoute);
    await switchRoute(activeRoute);
    await fetchVehicles();
    setInterval(fetchVehicles, REFRESH_MS);
  })();

  function shortReg(ref) {
    if (!ref) return '????';
    return ref.length >= 7 ? ref.slice(0, 4) + ' ' + ref.slice(4, 7) : ref;
  }

})();
</script>
</body>
</html>
