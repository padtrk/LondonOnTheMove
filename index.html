<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>London on the Move — Live Buses</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet CSS -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0b0e11;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    color: #d0d0d0;
  }

  #map {
    width: 100vw;
    height: 100vh;
  }

  .info {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 1000;
    background: rgba(0, 0, 0, 0.65);
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 14px;
    line-height: 1.4;
  }

  .info strong {
    color: #ffffff;
  }
</style>
</head>
<body>

<div id="map"></div>

<div class="info">
  <strong>London buses — live</strong><br>
  GPS positions from TfL<br>
  Updates every ~30 seconds
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// --------------------------------------------------
// Map setup
// --------------------------------------------------

const map = L.map("map", {
  zoomControl: false,
  attributionControl: false
}).setView([51.5074, -0.1278], 12);

L.tileLayer(
  "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
  { maxZoom: 19 }
).addTo(map);

// --------------------------------------------------
// Canvas renderer & layer
// --------------------------------------------------

const canvasRenderer = L.canvas({ padding: 0.5 });
const busLayer = L.layerGroup().addTo(map);

// --------------------------------------------------
// Load live TfL bus data
// --------------------------------------------------

async function loadBuses() {
  try {
    const response = await fetch(
      "https://api.tfl.gov.uk/Vehicle/Mode/bus"
    );

    const buses = await response.json();

    busLayer.clearLayers();

    buses.forEach(bus => {
      if (!bus.latitude || !bus.longitude) return;

      L.circleMarker(
        [bus.latitude, bus.longitude],
        {
          renderer: canvasRenderer,
          radius: 1.6,
          fillColor: "#e10600",
          fillOpacity: 0.8,
          stroke: false
        }
      ).addTo(busLayer);
    });

    console.log(`Rendered ${buses.length} buses`);

  } catch (err) {
    console.error("Failed to load TfL bus data", err);
  }
}

// --------------------------------------------------
// Run
// --------------------------------------------------

loadBuses();
setInterval(loadBuses, 30000);
</script>

</body>
</html>
